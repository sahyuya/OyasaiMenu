# OyasaiMenu メインコンフィグ

menu:
  default: root
  cache-seconds: 30
  chat-input-timeout: 30

editor:
  auto-backup: true
  backup-dir: "backups"

macro:
  max-per-player: 10
  cooldown-seconds: 3
  # 権限ごとのマクロ最大数。複数権限を持つ場合は最大値が採用される。
  # 設定しない場合は max-per-player が使われる。
  max-per-permission:
    navis.takumi: 10
    navis.blue: 20
    navis.white: 30

  # 空リストにすると全コマンドを許可
  command-whitelist:
    - "warp"
    - "home"
    - "spawn"
    - "tpa"
    - "msg"
    - "r"

placeholders:
  server-name: "MyServer"

utility:
  warps:
    - spawn

# ============================
# クールダウン設定
# ============================
cooldown:
  click-ms: 200
  command-ms: 300

# ============================
# 販売ホワイトリスト設定
# ============================
sell-whitelist:
  # true = カスタム名・特殊アイテムのホワイトリストチェックを有効にする
  enabled: true