# OyasaiMenu メインコンフィグ

menu:
  default: root
  cache-seconds: 30
  chat-input-timeout: 30

editor:
  auto-backup: true
  backup-dir: "backups"

discord:
  enabled: false
  cache-seconds: 60
  fetch-count: 5

macro:
  max-per-player: 10
  cooldown-seconds: 3
  # 空リストにすると全コマンドを許可
  command-whitelist:
    - "warp"
    - "home"
    - "spawn"
    - "tpa"
    - "msg"
    - "r"

placeholders:
  server-name: "MyServer"

# ユーティリティ画面の設定
utility:
  # ワープボタンに表示するワープ先一覧
  # (例: ["spawn", "hub", "market"] )
  warps:
    - spawn

# ============================
# クールダウン設定
# ============================
cooldown:
  # GUIクリックの反応クールダウン (ミリ秒)
  # 同一プレイヤーがこの時間内に連続クリックしても2回目以降は無視する
  # 0 = 無効
  click-ms: 300
  # コマンド実行のクールダウン (ミリ秒)
  # player_cmd / console_cmd の連続実行を防ぐ
  # 0 = 無効
  command-ms: 500