# menus/root.yml
# 総合メニュー (ポップアップ型)
#
# ■ レイアウト
#   スロット 0〜44: 灰色ガラス + お知らせ (announcements.yml から自動描画)
#   スロット 45〜53: NavBar が Kotlin 側で描画するため YAML 定義不要
#
# このファイルに YAML アイテムを追加してもスロット 45〜53 は NavBar で上書きされる。
# お知らせはスロット 0〜44 の空きスロットを使用する。

menu:
  id: root
  title: "&8✦ おやさい鯖 メニュー ✦"
  size: 54

items:
# YAML でナビバーを定義しない → NavBar.kt が Kotlin で直接描画する
# お知らせのないスロットは AnnouncementManager + MenuEngine が灰色ガラスで埋める