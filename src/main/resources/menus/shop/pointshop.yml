# menus/shop/pointshop.yml  ─  ポイントショップ定義
#
# ■ 各アイテムのフィールド説明
#   icon:              表示マテリアル名 (大文字)
#   name:              表示名 (%player% 使用可)
#   lore:              説明文 (%tokens%, %price%, %balance% 使用可)
#   cost:              必要ポイント数 (整数)
#   message:           購入時メッセージ (%price%, %tokens%, %player% 使用可)
#   commands:          購入時実行コマンドリスト (%player%, %price% 使用可)
#   close-on-purchase: true にすると購入後にGUIを閉じる (デフォルト: false)
#                      シュルカーボックスを開くなどGUIが干渉するアイテムに使用する

point1:
  name: '&cポイントショップ'
  items:
    '0':
      icon: GLASS
      name: '&c&l%player%の酸素ボンベ'
      lore:
        - '&b水中建築のお供に'
        - 'headで被って使用'
        - '※中級者以上'
        - '&d所持:&3%tokens%&fP'
        - '&a価格:&3%price%&fP'
      cost: 30
      message: '&bTM &8» &3%price%&fP&7使用しました'
      commands:
        - 'minecraft:give %player% glass[custom_name="%player%の酸素ボンベ",lore=[{text:"headで被ってお使い下さい"}],enchantments={aqua_affinity:1,respiration:10}] 1'

    '1':
