# items/custom_items.yml
#
# shops.yml で "$キー buyPrice sellPrice" と書いたときに参照されるカスタムアイテム定義。
#
# フォーマット:
#   キー名:
#     id: マテリアル名 (小文字 or 大文字どちらでも可)
#     name: '表示名 (&カラーコード対応)'
#     lore: ['説明文1', '説明文2']   # リスト形式
#     enchantments:
#       エンチャント名: レベル       # 旧来の Bukkit 名 (例: DIG_SPEED) または
#                                    # minecraft: キー名 (例: efficiency) どちらでも可

pickaxe_normal:
  id: diamond_pickaxe
  name: '&a普通のエンチャントツルハシ'
  lore: ['&7すごく普通。']
  enchantments:
    DIG_SPEED: 5
    UNBREAKING: 3

